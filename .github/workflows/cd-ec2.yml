name: CD (EC2)

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
  
    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with: 
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build Next.js
        run: npm run build
      - name: Create deployment package
        run: |
          tar -czf deploy.tar.gz \
          .next/standalone \
          .next/static \
          public

      - name: Upload to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "/var/www/frontend"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/frontend

            rm -rf .next public

            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            pm2 delete frontend 2>/dev/null

            pm2 start .next/standalone/server.js --name frontend --cwd /var/www/frontend
            pm2 save