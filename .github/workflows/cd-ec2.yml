name: CD (EC2)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "main"
        type: choice
        options:
          - main
          - dev

concurrency:
  group: cd-ec2-${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      DEPLOY_DIR: ${{ secrets.EC2_APP_DIR }}
      DEPLOY_USER: ${{ secrets.EC2_USER }}
      DEPLOY_PORT: ${{ secrets.EC2_PORT || '22' }}
      PM2_APP_NAME: frontend
      FRONTEND_PORT: ${{ secrets.FRONTEND_PORT || '3000' }}

    steps:
      - name: Resolve deploy ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "DEPLOY_REF=${{ inputs.branch }}" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_REF=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_ENV"
          fi

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build -- --webpack

      - name: Create deployment package
        run: |
          tar -czf deploy.tar.gz \
          .next \
          public \
          package.json \
          package-lock.json \
          next.config.ts
      - name: Configure SSH
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p "${{ env.DEPLOY_PORT }}" -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload package to EC2
        run: |
          set -e
          scp -i ~/.ssh/ec2_key -P "${{ env.DEPLOY_PORT }}" \
            deploy.tar.gz \
            "${{ env.DEPLOY_USER }}@${{ secrets.EC2_HOST }}:/tmp/deploy.tar.gz"

      - name: Deploy on EC2
        run: |
          set -e
          ssh -i ~/.ssh/ec2_key -p "${{ env.DEPLOY_PORT }}" "${{ env.DEPLOY_USER }}@${{ secrets.EC2_HOST }}" << 'EOF'
          set -e
          mkdir -p "${{ env.DEPLOY_DIR }}"
          mv /tmp/deploy.tar.gz "${{ env.DEPLOY_DIR }}/deploy.tar.gz"
          cd "${{ env.DEPLOY_DIR }}"
          tar -xzf deploy.tar.gz
          rm deploy.tar.gz
          npm ci --omit=dev
          if pm2 describe "${{ env.PM2_APP_NAME }}" > /dev/null 2>&1; then
            pm2 restart "${{ env.PM2_APP_NAME }}" --update-env
          else
            PORT="${{ env.FRONTEND_PORT }}" pm2 start npm --name "${{ env.PM2_APP_NAME }}" -- start
          fi
          pm2 save
          EOF
