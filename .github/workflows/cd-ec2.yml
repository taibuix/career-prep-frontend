name: CD (EC2)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "dev"

concurrency:
  group: cd-${{ github.ref_name || github.event.workflow_run.head_branch || 'manual' }}
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'dev'))
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
        run: |
          set -euo pipefail
          [ -n "${EC2_HOST}" ] || { echo "::error::Missing repository secret: EC2_HOST"; exit 1; }
          [ -n "${EC2_USER}" ] || { echo "::error::Missing repository secret: EC2_USER"; exit 1; }
          [ -n "${EC2_SSH_PRIVATE_KEY}" ] || { echo "::error::Missing repository secret: EC2_SSH_PRIVATE_KEY"; exit 1; }
          [ -n "${EC2_APP_DIR}" ] || { echo "::error::Missing repository secret: EC2_APP_DIR"; exit 1; }

      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script_stop: true
          envs: APP_DIR,DEPLOY_BRANCH,NODE_ENV,PM2_APP_NAME,PORT
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.EC2_APP_DIR }}"
            NODE_ENV="production"
            PM2_APP_NAME="career-prep-frontend"
            PORT="${{ secrets.FRONTEND_PORT || 3000 }}"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              DEPLOY_BRANCH="${{ github.event.inputs.branch }}"
            elif [ "${{ github.event_name }}" = "workflow_run" ]; then
              DEPLOY_BRANCH="${{ github.event.workflow_run.head_branch }}"
            fi
            export APP_DIR DEPLOY_BRANCH NODE_ENV PM2_APP_NAME PORT
            cd "${APP_DIR}"
            git reset --hard
            git clean -fd
            git fetch --all --prune
            git checkout "${DEPLOY_BRANCH}"
            git pull --ff-only origin "${DEPLOY_BRANCH}"
            echo "Current directory: $(pwd)"
            echo "Current branch: $(git branch --show-current)"
            if [ -f "./deploy/ec2-deploy.sh" ]; then
              bash "./deploy/ec2-deploy.sh"
            else
              echo "deploy/ec2-deploy.sh not found; running inline fallback deploy" >&2
              ls -la
              export NODE_ENV PORT
              npm ci
              npm run build -- --webpack
              if pm2 describe "${PM2_APP_NAME}" >/dev/null 2>&1; then
                pm2 restart "${PM2_APP_NAME}" --update-env
              else
                pm2 start npm --name "${PM2_APP_NAME}" -- run start
              fi
              pm2 save
            fi
