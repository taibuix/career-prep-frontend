name: CD (EC2)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "main"

concurrency:
  group: cd-${{ github.ref_name || github.event.workflow_run.head_branch || 'manual' }}
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'dev'))
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script_stop: true
          envs: APP_DIR,DEPLOY_BRANCH,NODE_ENV,PM2_APP_NAME,PORT
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.EC2_APP_DIR }}"
            NODE_ENV="production"
            PM2_APP_NAME="career-prep-frontend"
            PORT="${{ secrets.FRONTEND_PORT || 3000 }}"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              DEPLOY_BRANCH="${{ github.event.inputs.branch }}"
            elif [ "${{ github.event_name }}" = "workflow_run" ]; then
              DEPLOY_BRANCH="${{ github.event.workflow_run.head_branch }}"
            fi
            export APP_DIR DEPLOY_BRANCH NODE_ENV PM2_APP_NAME PORT
            bash "${APP_DIR}/deploy/ec2-deploy.sh"
